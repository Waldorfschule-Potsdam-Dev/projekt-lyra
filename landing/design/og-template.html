<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600&display=swap');
  
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    padding: 0;
    width: 1200px;
    height: 630px;
    background: #08080d;
    background-image:
      radial-gradient(ellipse at top left, rgba(168, 85, 247, 0.4), transparent 60%),
      radial-gradient(ellipse at bottom right, rgba(107, 33, 168, 0.3), transparent 60%);
    font-family: 'Inter', sans-serif;
    color: #f4f4f5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 100px;
    overflow: hidden;
  }
  .content {
    flex: 1;
    max-width: 600px;
    z-index: 2;
  }
  h1 {
    font-family: 'Orbitron', monospace;
    font-size: 84px;
    font-weight: 900;
    color: #ffffff;
    margin: 0 0 24px 0;
    line-height: 1.1;
    text-transform: uppercase;
    text-shadow: 0 0 40px rgba(168, 85, 247, 0.6);
  }
  .highlight {
    color: #c084fc;
  }
  p {
    font-size: 36px;
    color: #e4e4e7;
    margin: 0;
    line-height: 1.45;
    font-weight: 600;
  }
  .phones {
    position: relative;
    width: 380px;
    height: 630px;
    display: flex;
    align-items: center;
  }
  .phone-mockup {
    position: absolute;
    top: 20px;
    right: 10px;
    width: 340px;
    height: 700px;
    border-radius: 40px;
    background: #000;
    border: 12px solid #1c1c28;
    box-shadow: -20px 30px 60px rgba(0,0,0,0.8), 0 0 50px rgba(168, 85, 247, 0.3);
    overflow: hidden;
    transform: rotate(-6deg);
  }
  .phone-mockup img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
</style>
</head>
<body>
  <div class="content">
    <h1>Projekt<br><span class="highlight">Lyra</span></h1>
    <p>Du hast ein Smartphone gefunden.<br>Kannst du das Rätsel um<br>Daniel lösen?</p>
  </div>
  <div class="phones">
    <div class="phone-mockup">
      <img src="./screenshots/home.jpg" alt="Home Screen">
    </div>
  </div>
</body>
</html>
