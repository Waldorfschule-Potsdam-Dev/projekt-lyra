<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600&display=swap');
  
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    padding: 0;
    width: 1080px;
    height: 1080px;
    background: #08080d;
    background-image:
      radial-gradient(ellipse at top left, rgba(168, 85, 247, 0.5), transparent 60%),
      radial-gradient(ellipse at bottom right, rgba(107, 33, 168, 0.4), transparent 60%);
    font-family: 'Inter', sans-serif;
    color: #f4f4f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px;
    overflow: hidden;
    position: relative;
    text-align: center;
  }
  .content {
    position: relative;
    z-index: 2;
  }
  h1 {
    font-family: 'Orbitron', monospace;
    font-size: 110px;
    font-weight: 900;
    color: #ffffff;
    margin: 0 0 32px 0;
    line-height: 1.1;
    text-transform: uppercase;
    text-shadow: 0 0 50px rgba(168, 85, 247, 0.8);
  }
  .highlight {
    color: #c084fc;
  }
  p {
    font-size: 44px;
    color: #e4e4e7;
    margin: 0;
    line-height: 1.45;
    font-weight: 600;
  }
  .phone-mockup {
    position: absolute;
    right: -150px;
    bottom: -150px;
    width: 600px;
    height: 1200px;
    border-radius: 50px;
    background: #000;
    border: 14px solid #1c1c28;
    box-shadow: -20px 30px 80px rgba(0,0,0,0.8), 0 0 100px rgba(168, 85, 247, 0.5);
    overflow: hidden;
    transform: rotate(20deg);
    opacity: 0.25;
    z-index: 1;
    filter: blur(3px);
  }
  .phone-mockup img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
</style>
</head>
<body>
  <div class="content">
    <h1>Projekt <span class="highlight">Lyra</span></h1>
    <p>Du hast ein Smartphone gefunden.<br>Kannst du das Rätsel um Daniel lösen?</p>
  </div>
  <div class="phone-mockup">
    <img src="./screenshots/home.jpg" alt="Home Screen">
  </div>
</body>
</html>
